<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetHaven - Sign Up</title>
    <link rel="stylesheet" href="SignUp.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="sign-up.js" defer></script>
  </head>
  <body>

    <header>
      <div class="logo">
        <a href="main-front-page.html">🐾 <span>PetHaven</span></a>
      </div>

      <nav>
      </nav>

      <a class="call-btn" id="SignUp">SIGN UP</a>
    </header>

    <main>
      <div class="card">

        <!-- Tab Toggle -->
        <div class="tab-toggle">
          <button class="tab-btn active" id="tabSignUp">Sign Up</button>
          <button class="tab-btn" id="tabLogIn">Log In</button>
        </div>

        <!-- SIGN UP FORM -->
        <div id="signUpForm">
          <h2>Join PetHaven 🌸</h2>
          <p>Create your free account!</p>

          <div class="two-col">
            <div>
              <label>First Name</label>
              <input type="text" id="firstName" placeholder="e.g. Nash"/>
            </div>
            <div>
              <label>Last Name</label>
              <input type="text" id="lastName" placeholder="e.g. Villaviray"/>
            </div>
          </div>

          <label>Email Address</label>
          <input type="email" id="signUpEmail" placeholder="you@example.com"/>

          <label>Password</label>
          <input type="password" id="signUpPassword" placeholder="Min. 8 characters"/>

          <label>Your Pet</label>
          <select id="pet">
            <option value="" disabled selected>Choose your pet 🐾</option>
            <option>🐶 Dog</option>
            <option>🐱 Cat</option>
            <option>🐰 Rabbit</option>
            <option>🐹 Hamster</option>
            <option>🐦 Bird</option>
            <option>🐠 Fish</option>
            <option>🦎 Reptile</option>
            <option>🐾 Other</option>
          </select>

          <div class="checkbox">
            <input type="checkbox" id="terms"/>
            <span>I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a></span>
          </div>

          <button type="button" id="createAccountBtn">Create My Account</button>
          <div id="signUpMsg" class="msg"></div>
        </div>

        <div id="logInForm" style="display:none;">
          <h2>Welcome Back 🐾</h2>
          <p>Log in to your PetHaven account!</p>

          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="you@example.com"/>

          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Your password"/>

          <button type="button" id="loginBtn">Log In</button>
          <div id="logInMsg" class="msg"></div>
        </div>

      </div>
    </main>

  </body>
</html>
